apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: wanderblog-eks-cluster
  region: eu-west-2
  version: "1.35" 
  tags:
    owner: gauri-shirkande
    bu: cwg
    project: wanderblog

availabilityZones:
  - eu-west-2a
  - eu-west-2b

iam:
  withOIDC: true

managedNodeGroups:
  - name: wanderblog-node-group
    instanceType: t2.medium
    minSize: 2
    maxSize: 4
    privateNetworking: true
    volumeSize: 30
    iam:
      withAddonPolicies:
        autoScaler: true
        externalDNS: false
        certManager: yes
        ebs: true
        fsx: false
        efs: false
        albIngress: true
        xRay: false
        cloudWatch: false
    labels:
      lifecycle: ec2-autoscaler
